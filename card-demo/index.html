(function () {
  var realFetch = window.fetch ? window.fetch.bind(window) : null;
  window.fetch = function (input, init) {
    var url = typeof input === 'string' ? input : (input && input.url) || '';
    if (/\/vault\/v1\/tokens/.test(url) && init && (init.method || '').toUpperCase() === 'POST') {
      var vt = 'tok_demo-' + (crypto.randomUUID ? crypto.randomUUID() : Date.now());
      return Promise.resolve(new Response(JSON.stringify({ vaultTokenId: vt }), {
        status: 200, headers: { 'Content-Type': 'application/json' },
      }));
    }
    return realFetch ? realFetch(input, init) : Promise.reject(new Error('demo: blocked ' + url));
  };

  // DEMO-ONLY: the real page gets its theme from the app (data-theme set server-side from
  // isDarkTheme). The static demo has no app, so follow the device via prefers-color-scheme
  // to faithfully show dark/light. (Not in the real page — it always receives an explicit theme.)
  try {
    var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
