<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Card information</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after { box-sizing: border-box; }
      :root {
        --accent: #5841d8;
        --accent-on: #fff;
        --text: #101114;
        --text-muted: #686b82;
        --negative: #d12d36;
        --negative-surface: rgba(209, 45, 54, 0.08);
        --surface: #fff;
        --border: rgba(104, 107, 130, 0.32);
        --bg: #fff;
        --radius: 12px;
        --field-radius: 8px;
      }
      html[data-theme='dark'] {
        --accent: #7767e4;
        --text: #f7f7fa;
        --text-muted: #9497a9;
        --negative: #ff6b73;
        --negative-surface: rgba(255, 107, 115, 0.12);
        --surface: #22232d;
        --bg: #1a1b22;
      }
      html { height: 100%; overflow: hidden; }
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'IBM Plex Sans', Helvetica, Arial, sans-serif;
        line-height: 1.5;
      }
      .container {
        box-sizing: border-box;
        height: 100dvh;
        padding: 20px 16px calc(20px + env(safe-area-inset-bottom));
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      form { display: flex; flex-direction: column; gap: 16px; flex: 1; min-height: 0; }
      .name-field { margin-bottom: 0; }
      input {
        width: 100%;
        padding: 13px 12px;
        color: var(--text);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--field-radius);
        outline-offset: -2px;
        font: inherit;
      }
      input:focus { outline: 2px solid var(--accent); }
      input::placeholder { color: var(--text-muted); }
      input.invalid { outline: 2px solid var(--negative); }
      input:disabled { background: rgba(104, 107, 130, 0.06); border: none; }
      .card-fields { display: flex; flex-direction: column; }
      .card-number { border-radius: var(--field-radius) var(--field-radius) 0 0; }
      .second-row { display: grid; grid-template-columns: 1fr 1fr; }
      .exp { border-radius: 0 0 0 var(--field-radius); border-top: none; border-right: none; }
      .cvv { border-radius: 0 0 var(--field-radius) 0; border-top: none; }
      .error-banner {
        display: none;
        padding: 12px 16px;
        border-radius: var(--radius);
        background: var(--negative-surface);
        color: var(--negative);
        font-size: 14px;
      }
      .error-banner.visible { display: block; }
      .field-error { display: none; margin-top: -8px; color: var(--negative); font-size: 12px; }
      .field-error.visible { display: block; }
      .address {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 8px 0;
      }
      .address-label { color: var(--text-muted); font-size: 12px; }
      .address-value { color: var(--text); font-size: 14px; }
      .submit {
        margin-top: auto;
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: var(--radius);
        background: var(--accent);
        color: var(--accent-on);
        font: inherit;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
      }
      .submit:disabled { opacity: 0.4; cursor: default; }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="error-banner" class="error-banner" role="alert"></div>
      <form id="card-form" novalidate>
        <label class="name-field">
          <input type="text" id="card-name" value="Test Cardholder" disabled />
        </label>

        <div class="card-fields">
          <input
            type="text"
            id="card-number"
            class="card-number"
            aria-label="Card number"
            placeholder="1234 5678 9012 3456"
            maxlength="19"
            autocomplete="cc-number"
            inputmode="numeric"
            autofocus
          />
          <div class="second-row">
            <input
              type="text"
              id="exp"
              class="exp"
              aria-label="Expiry date"
              placeholder="MM / YY"
              maxlength="7"
              autocomplete="cc-exp"
              inputmode="numeric"
            />
            <input
              type="text"
              id="cvv"
              class="cvv"
              aria-label="Security code"
              placeholder="CVC"
              maxlength="3"
              autocomplete="cc-csc"
              inputmode="numeric"
            />
          </div>
        </div>
        <span id="field-error" class="field-error"></span>

        <div class="address">
          <div>
            <div class="address-label">Billing address</div>
            <div class="address-value">•••• London, EC1A 1BB</div>
          </div>
        </div>

        <button type="submit" id="submit" class="submit">Add card</button>
      </form>
    </div>

    <script>
      // Standalone demo: validates, then redirects to the cardftdemo:// callback with a
      // dummy token. No backend. The point of the demo is that the native card autofill
      // (Keychain / password managers) fires on the cc-* fields inside the in-app browser sheet.
      var REDIRECT_URI = 'cardftdemo://card/callback';
      var numberEl = document.getElementById('card-number');
      var expEl = document.getElementById('exp');
      var cvvEl = document.getElementById('cvv');
      var submitEl = document.getElementById('submit');
      var errorEl = document.getElementById('field-error');

      var luhn = function (s) {
        var d = s.replace(/\s/g, '');
        if (!/^\d{13,19}$/.test(d)) return false;
        var sum = 0, alt = false;
        for (var i = d.length - 1; i >= 0; i--) {
          var n = parseInt(d.charAt(i), 10);
          if (alt) { n *= 2; if (n > 9) n -= 9; }
          sum += n; alt = !alt;
        }
        return sum % 10 === 0;
      };
      var validExp = function (v) {
        var p = v.split('/');
        var m = (p[0] || '').trim(), y = (p[1] || '').trim();
        return /^(0[1-9]|1[0-2])$/.test(m) && /^\d{2}$/.test(y);
      };
      var valid = function () {
        return luhn(numberEl.value) && validExp(expEl.value) && /^\d{3}$/.test(cvvEl.value);
      };
      var refresh = function () { submitEl.disabled = !valid(); };

      numberEl.addEventListener('input', function () {
        var d = numberEl.value.replace(/\D/g, '');
        var out = '';
        for (var i = 0; i < d.length; i++) { if (i % 4 === 0 && i > 0) out += ' '; out += d[i]; }
        numberEl.value = out;
        refresh();
      });
      expEl.addEventListener('input', function () {
        var d = expEl.value.replace(/[^\d]/g, '').slice(0, 4);
        expEl.value = d.length > 2 ? d.slice(0, 2) + ' / ' + d.slice(2) : d;
        refresh();
      });
      cvvEl.addEventListener('input', function () {
        cvvEl.value = cvvEl.value.replace(/\D/g, '').slice(0, 3);
        refresh();
      });

      document.getElementById('card-form').addEventListener('submit', function (e) {
        e.preventDefault();
        if (!valid()) {
          errorEl.textContent = 'Enter valid card details';
          errorEl.classList.add('visible');
          return;
        }
        submitEl.textContent = 'Adding…';
        submitEl.disabled = true;
        var token = 'tok_demo-' + (crypto.randomUUID ? crypto.randomUUID() : Date.now());
        var url = new URL(REDIRECT_URI);
        url.searchParams.set('t', token);
        window.location.assign(url.toString());
      });

      refresh();
    </script>
  </body>
</html>
